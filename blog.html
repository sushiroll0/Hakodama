<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hakodama</title>
 <!-- All css Styles here -->
  <link rel="stylesheet" href="blogStyles.css">
 <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Overlay Background -->
<div class="overlay" id="overlay"></div>

<!-- Hamburger Button -->
<div id="hamburger">&#9776;</div>

<!-- Sidebar Navigation -->
<nav id="sidebar" class="sidebar-nav hidden">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

</body>
 <h2>Search posts</h2>
<input type="text" id="search-bar" placeholder="Search posts..." />



<div class="container">
   <h1 class="write-a-blog-post">Write a Blog Post</h1>

  
    <form id="blog-form" class="blog-form" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Blog title" required>
        <textarea name="content" placeholder="Write your blog post..." required></textarea>
       <div class="file-post-wrapper">
           <input type="file" name="media" accept="image/*,video/*">
           <button type="submit" id="submit-button">Post</button>
           <button type="button" id="cancel-edit" style="display: none;">Cancel</button>
        </div> 
     
      <div class="blog-post-content">${post.content}</div>
   
    </form>
      
      <div class="confirmation" id="confirmation"></div>
      
      <h2 class="Recent-Posts">Recent Posts</h2>
      <div class="post-container" id="blog-posts"></div>
  

<!-- ✅ Blog-only script -->
<script src="blogScript.js" defer></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const hamburger = document.getElementById("hamburger");
    const sidebar = document.getElementById("sidebar");

    hamburger.addEventListener("click", () => {
      sidebar.classList.toggle("hidden");
    });
  });
</script>
