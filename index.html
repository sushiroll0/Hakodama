<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hakodama</title>
  <link rel="stylesheet" href="styles.css">
  <style>


    body, html {
      margin: 0;
      padding: 0;
      background-color:#996900; /* matches dark theme */
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }



    


    .splash {
      animation: fadeOut 2s ease-out 4s forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img src="hakodama.png" alt="Hakodama Logo" width="300">
  </div>



<iframe width="560" height="315"
  src="https://www.youtube.com/embed/aGCdLKXNF3w"
  title="YouTube video player"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>




  
</body>
</html>
